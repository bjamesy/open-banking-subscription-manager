# Boot the whole project: docker compose up --build
#   Frontend (SPA + /api proxy): http://localhost:5173
#   Backend API (direct):        http://localhost:8000
#
# Secrets (Plaid, encryption key, JWT) are read from backend/.env — the same
# file used for local development. DATABASE_URL is overridden below to point
# at the postgres service. VITE_GOOGLE_CLIENT_ID is a frontend *build* arg
# (baked into the JS bundle by Vite, not a runtime env var), sourced from a
# root-level .env, which Compose auto-loads for ${...} substitution here.

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: subtrack
      POSTGRES_PASSWORD: subtrack
      POSTGRES_DB: subtrack
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U subtrack -d subtrack"]
      interval: 3s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    env_file:
      - backend/.env
    environment:
      DATABASE_URL: postgresql://subtrack:subtrack@db:5432/subtrack
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 5s
      timeout: 3s
      retries: 10

  frontend:
    build:
      context: ./frontend
      args:
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
